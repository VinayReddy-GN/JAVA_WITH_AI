<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Courses Page</title>
    <style>
      body {
        font-family: Arial;
        display: flex;
        justify-content: center;
        margin-top: 80px;
        background: #f0f4f8;
      }
      .box {
        background: white;
        padding: 36px;
        border-radius: 12px;
        width: 400px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      }
      h1 {
        color: #1565c0;
        text-align: center;
        margin-bottom: 20px;
      }
      ul {
        list-style: none;
        padding: 0;
      }
      li {
        background: #e3f2fd;
        margin: 10px 0;
        padding: 12px;
        border-radius: 8px;
        font-weight: 600;
        color: #0d47a1;
        text-align: center;
        box-shadow: 0 2px 6px rgba(0,0,0,0.05);
      }
    </style>
  </head>
  <body>
    <div class="box">
      <h1>Available Courses</h1>
      <ul>
        <li>Computer Science</li>
        <li>Mathematics</li>
        <li>Physics</li>
        <li>Business Administration</li>
        <li>English Literature</li>
      </ul>
    </div>
  </body>
</html>
